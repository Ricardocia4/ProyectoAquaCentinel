<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaSentinel - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #EAF6FF 0%, #ffffff 100%); min-height: 100vh; }
        .guest-card { background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 15px 50px rgba(0, 51, 120, 0.15); width: 100%; max-width: 440px; }
    </style>
</head>
<body class="flex flex-col justify-center items-center p-4">
    <div class="mb-8 text-center">
        <div class="flex items-center justify-center text-2xl font-bold text-blue-900">
            <span class="mr-2">🌊</span> AquaSentinel
        </div>
    </div>

    <div class="guest-card">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900">{% block title %}Bienvenido{% endblock %}</h1>
            <p class="text-gray-500">{% block subtitle %}Accede a tu cuenta{% endblock %}</p>
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>

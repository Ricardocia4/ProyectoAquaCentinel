{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaSentinel - {% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/png" href="{% static 'web/img/icon-aquacentinel.png' %}">

    <style>
        :root {
            --sidebar-bg: #ffffff;
            --main-bg: #f3f6f9;
            --accent-color: #0d6efd;
            --text-muted: #8e96a2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);
            color: #2c3e50;
        }

        @media (min-width: 992px) {
            .sidebar-wrapper {
                width: 280px;
                height: 100vh;
                position: sticky;
                top: 0;
                background: var(--sidebar-bg);
                border-right: 1px solid rgba(0,0,0,0.05);
                box-shadow: 4px 0 24px rgba(0,0,0,0.02);
            }
        }

        .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }

        .nav-link i {
            font-size: 1.1rem;
            width: 24px;
        }

        .nav-link:hover {
            background-color: #f8faff;
            color: var(--accent-color);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%);
            color: white !important;
            box-shadow: 0 8px 15px rgba(13, 110, 253, 0.25);
        }

        .nav-link.active i { color: white !important; }

        .btn-logout {
            color: #dc3545;
            opacity: 0.7;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            opacity: 1;
            background-color: #fff5f5;
        }

        .main-content {
            flex: 1;
            padding: 2.5rem;
            min-width: 0;
        }

        .fw-black { font-weight: 900 !important; }

        .logo-box {
            background: linear-gradient(135deg, #0d6efd 0%, #00c6ff 100%);
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="d-flex flex-column flex-lg-row min-vh-100">
        <header class="d-lg-none bg-white border-bottom p-3 sticky-top shadow-sm">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="logo-box me-2" style="width: 35px; height: 35px;">
                        <img src="{% static 'web/img/icon-aquacentinel.png' %}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <span class="fw-black text-dark tracking-tight">AQUACENTINEL</span>
                </div>
                <button class="btn btn-light border-0 bg-light-subtle" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                    <i class="fas fa-bars text-primary"></i>
                </button>
            </div>
        </header>

        <div class="offcanvas-lg offcanvas-start sidebar-wrapper" tabindex="-1" id="mobileSidebar">
            <div class="offcanvas-header border-bottom d-lg-none">
                <div class="d-flex align-items-center">
                    <div class="logo-box me-2" style="width: 32px; height: 32px;">
                        <img src="{% static 'web/img/icon-aquacentinel.png' %}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <h5 class="offcanvas-title fw-black text-dark mb-0">AquaSentinel</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#mobileSidebar"></button>
            </div>

            <div class="offcanvas-body d-flex flex-column p-4 h-100">
                <div class="d-none d-lg-flex align-items-center mb-5 px-2">
                    <div class="logo-box me-3" style="width: 40px; height: 40px;">
                        <img src="{% static 'web/img/icon-aquacentinel.png' %}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <span class="h4 mb-0 fw-black text-dark" style="letter-spacing: -0.5px;">AquaSentinel</span>
                </div>

                <p class="text-uppercase small fw-bold text-muted mb-3 px-2" style="font-size: 0.7rem; letter-spacing: 1px;">Menú Principal</p>
                <ul class="nav nav-pills flex-column mb-auto">
                    <li class="nav-item">
                        <a href="{% url 'web:dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                            <i class="fas fa-th-large me-3"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'web:mis_boyas' %}" class="nav-link {% if 'boya' in request.path %}active{% endif %}">
                            <i class="fas fa-water me-3"></i> Mis Boyas
                        </a>
                    </li>
                </ul>

                <div class="mt-auto border-top pt-4">
                    <p class="text-uppercase small fw-bold text-muted mb-3 px-2" style="font-size: 0.7rem; letter-spacing: 1px;">Configuración</p>
                    <a href="#" class="nav-link mb-1"><i class="fas fa-user-circle me-3"></i> Mi Perfil</a>

                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn-logout border-0 bg-transparent w-100 text-start">
                            <i class="fas fa-sign-out-alt me-3"></i> Cerrar Sesión
                        </button>
                    </form>

                    <div class="mt-4 px-2">
                        <div class="bg-light rounded-3 p-3 text-center border">
                            <span class="d-block small text-muted fw-bold">Versión del Sistema</span>
                            <span class="badge bg-white text-primary border px-2 py-1 mt-1">v1.0.0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>const csrftoken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');</script>
    {% block scripts %}{% endblock %}
</body>
</html>
